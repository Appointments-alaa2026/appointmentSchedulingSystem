name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B jacoco:prepare-agent verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.6.0.6792:sonar
          jacoco:report
          -Dsonar.projectKey=Appointments-alaa2026_appointmentSchedulingSystem
          -Dsonar.organization=appointments-alaa2026
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.exclusions=**/app/Main.java
